<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EmailJS Template - 1IN1B Contact Form</title>
</head>
<body style="margin:0;padding:0;background:#09090b;font-family:system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#09090b;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#18181b;border:1px solid #27272a;">
          <!-- Header -->
          <tr>
            <td style="background:#f97316;padding:24px 32px;text-align:center;">
              <h1 style="margin:0;color:#09090b;font-size:28px;font-weight:900;letter-spacing:-1px;">1IN1B</h1>
              <p style="margin:4px 0 0;color:#09090b;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;">New Project Inquiry</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <!-- Email -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
                <tr>
                  <td style="color:#a1a1aa;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;">FROM</td>
                </tr>
                <tr>
                  <td style="background:#09090b;border:1px solid #27272a;padding:16px;color:#f8fafc;font-size:16px;font-weight:600;">
                    {{user_email}}
                  </td>
                </tr>
              </table>
              <!-- Subject -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
                <tr>
                  <td style="color:#a1a1aa;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;">SUBJECT</td>
                </tr>
                <tr>
                  <td style="background:#09090b;border:1px solid #27272a;padding:16px;color:#f8fafc;font-size:16px;font-weight:600;">
                    {{subject}}
                  </td>
                </tr>
              </table>
              <!-- Message -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="color:#a1a1aa;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;">MESSAGE</td>
                </tr>
                <tr>
                  <td style="background:#09090b;border:1px solid #27272a;padding:16px;color:#f8fafc;font-size:14px;line-height:1.6;">
                    {{message}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="border-top:1px solid #27272a;padding:20px 32px;text-align:center;">
              <p style="margin:0;color:#71717a;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;">
                Sent via 1IN1B Agency Contact Form
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
